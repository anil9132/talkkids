<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7c3aed">
<title>TalkKids - Class 2 English</title>
<style>
  :root {
    --purple: #7c3aed;
    --pink: #ec4899;
    --yellow: #fbbf24;
    --green: #10b981;
    --blue: #3b82f6;
    --orange: #f97316;
    --bg: #faf5ff;
    --card: #ffffff;
    --text: #1e1b4b;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); }

  /* ── SCREENS ── */
  .screen { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── HOME ── */
  #home {
    background: linear-gradient(160deg, #7c3aed 0%, #a855f7 40%, #ec4899 100%);
    align-items: center; justify-content: center; text-align: center; padding: 2rem 1.5rem;
  }
  .home-mascot { font-size: 5rem; animation: bounce 2s infinite; margin-bottom: 0.5rem; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .home-title { color: white; font-size: 2.2rem; font-weight: 900; letter-spacing: -0.02em; }
  .home-sub { color: rgba(255,255,255,0.8); font-size: 1rem; margin: 0.4rem 0 2rem; }
  .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; width: 100%; max-width: 340px; }
  .home-btn {
    background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
    border-radius: 16px; padding: 1.1rem 0.5rem; cursor: pointer;
    color: white; font-weight: 700; font-size: 0.9rem;
    transition: transform 0.15s, background 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
  }
  .home-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.35); }
  .home-btn .btn-icon { font-size: 2rem; }
  .stars-bar { display: flex; gap: 0.3rem; margin-top: 1.5rem; }
  .star { font-size: 1.4rem; transition: transform 0.3s; }
  .star.lit { animation: starPop 0.4s ease; }
  @keyframes starPop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }

  /* ── LESSON SCREEN ── */
  #lesson { background: var(--bg); }
  .lesson-header {
    background: var(--purple); color: white;
    padding: 0.85rem 1rem 0.7rem;
    display: flex; align-items: center; gap: 0.75rem;
    box-shadow: 0 2px 12px rgba(124,58,237,0.3);
  }
  .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 10px; padding: 0.4rem 0.75rem; font-size: 1rem; cursor: pointer; }
  .lesson-title { font-weight: 800; font-size: 1rem; flex: 1; }
  .lesson-score { background: var(--yellow); color: #78350f; border-radius: 999px; padding: 0.25rem 0.6rem; font-weight: 800; font-size: 0.8rem; }

  .lesson-body { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.85rem; }

  /* ── DIALOGUE BUBBLES ── */
  .dialogue-wrap { display: flex; flex-direction: column; gap: 0.6rem; }
  .bubble-row { display: flex; align-items: flex-end; gap: 0.5rem; }
  .bubble-row.teacher { flex-direction: row; }
  .bubble-row.student { flex-direction: row-reverse; }
  .avatar { width: 2.2rem; height: 2.2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
  .avatar.teacher-av { background: #ede9fe; }
  .avatar.student-av { background: #fce7f3; }
  .bubble {
    max-width: 75%; padding: 0.65rem 0.9rem; border-radius: 16px;
    font-size: 0.92rem; line-height: 1.5; position: relative; cursor: pointer;
    transition: transform 0.15s;
  }
  .bubble:active { transform: scale(0.97); }
  .bubble.teacher-b { background: white; color: var(--text); border: 2px solid #ede9fe; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .bubble.student-b { background: var(--purple); color: white; border-bottom-right-radius: 4px; }
  .bubble .speak-icon { font-size: 0.75rem; opacity: 0.6; margin-left: 0.4rem; }
  .bubble .translation { font-size: 0.75rem; opacity: 0.65; margin-top: 0.2rem; font-style: italic; display: none; }
  .bubble.show-trans .translation { display: block; }
  .translate-hint { text-align: center; color: var(--muted); font-size: 0.75rem; margin: -0.3rem 0; }

  /* ── QUIZ ── */
  .quiz-card {
    background: white; border-radius: 18px; padding: 1.25rem;
    border: 2px solid #ede9fe; box-shadow: 0 4px 20px rgba(124,58,237,0.08);
  }
  .quiz-q { font-weight: 700; color: var(--text); font-size: 0.95rem; margin-bottom: 0.85rem; }
  .quiz-q .q-label { background: var(--purple); color: white; border-radius: 6px; padding: 1px 8px; font-size: 0.75rem; margin-right: 0.4rem; }
  .quiz-options { display: flex; flex-direction: column; gap: 0.5rem; }
  .quiz-opt {
    border: 2px solid #e5e7eb; border-radius: 12px; padding: 0.65rem 0.9rem;
    background: white; cursor: pointer; font-size: 0.88rem; color: var(--text); text-align: left;
    transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem;
  }
  .quiz-opt:active { transform: scale(0.98); }
  .quiz-opt.correct { background: #d1fae5; border-color: var(--green); color: #065f46; }
  .quiz-opt.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
  .quiz-opt.disabled { pointer-events: none; }
  .quiz-feedback { margin-top: 0.75rem; border-radius: 10px; padding: 0.6rem 0.85rem; font-size: 0.85rem; font-weight: 600; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.good { background: #d1fae5; color: #065f46; }
  .quiz-feedback.bad { background: #fee2e2; color: #991b1b; }

  /* ── FILL BLANK ── */
  .fill-wrap { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; font-size: 0.95rem; font-weight: 600; color: var(--text); }
  .fill-blank {
    border: none; border-bottom: 3px solid var(--purple); background: transparent;
    font-size: 0.95rem; font-weight: 700; color: var(--purple);
    width: 90px; text-align: center; outline: none; padding: 0.1rem 0.2rem;
  }
  .check-btn {
    margin-top: 0.75rem; background: var(--purple); color: white; border: none;
    border-radius: 12px; padding: 0.6rem 1.5rem; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; width: 100%;
  }
  .check-btn:active { opacity: 0.85; }

  /* ── WORD MATCH ── */
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .match-word {
    border: 2px solid #e5e7eb; border-radius: 12px; padding: 0.6rem;
    text-align: center; font-size: 0.88rem; font-weight: 600; cursor: pointer;
    background: white; transition: all 0.2s; color: var(--text);
  }
  .match-word.selected { border-color: var(--purple); background: #ede9fe; color: var(--purple); }
  .match-word.matched { border-color: var(--green); background: #d1fae5; color: #065f46; pointer-events: none; }
  .match-word.wrong-sel { border-color: #ef4444; background: #fee2e2; }

  /* ── VOCAB CARD ── */
  .vocab-card {
    background: white; border-radius: 18px; padding: 1.25rem;
    border: 2px solid #fce7f3; text-align: center;
    box-shadow: 0 4px 20px rgba(236,72,153,0.08);
  }
  .vocab-emoji { font-size: 3rem; margin-bottom: 0.4rem; }
  .vocab-word { font-size: 1.4rem; font-weight: 900; color: var(--purple); }
  .vocab-phonetic { font-size: 0.85rem; color: var(--muted); font-style: italic; }
  .vocab-meaning { margin-top: 0.4rem; font-size: 0.9rem; color: var(--text); }
  .vocab-example { margin-top: 0.5rem; font-size: 0.85rem; color: var(--muted); font-style: italic; background: #faf5ff; padding: 0.5rem 0.75rem; border-radius: 8px; }
  .speak-btn {
    margin-top: 0.75rem; background: var(--pink); color: white; border: none;
    border-radius: 12px; padding: 0.55rem 1.25rem; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem;
  }

  /* ── SECTION HEADERS ── */
  .section-head {
    display: flex; align-items: center; gap: 0.5rem;
    font-weight: 800; font-size: 0.82rem; color: var(--purple);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.3rem 0;
  }
  .section-head::after { content:''; flex:1; height:2px; background: linear-gradient(90deg,#ede9fe,transparent); }

  /* ── PROGRESS ── */
  .prog-bar-wrap { background: #ede9fe; border-radius: 999px; height: 8px; margin: 0.5rem 0; }
  .prog-bar { background: linear-gradient(90deg, var(--purple), var(--pink)); height: 100%; border-radius: 999px; transition: width 0.5s ease; }

  /* ── CELEBRATION ── */
  #celebration {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
    display: none; align-items: center; justify-content: center;
  }
  #celebration.show { display: flex; }
  .cel-card { background: white; border-radius: 24px; padding: 2rem; text-align: center; max-width: 280px; width: 90%; }
  .cel-emoji { font-size: 4rem; animation: bounce 1s infinite; }
  .cel-title { font-size: 1.5rem; font-weight: 900; color: var(--purple); margin: 0.5rem 0 0.25rem; }
  .cel-msg { color: var(--muted); font-size: 0.9rem; }
  .cel-btn { margin-top: 1rem; background: var(--purple); color: white; border: none; border-radius: 12px; padding: 0.75rem 2rem; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; }

  /* ── SCROLLBAR ── */
  .lesson-body::-webkit-scrollbar { width: 3px; }
  .lesson-body::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 2px; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="home-mascot">🦉</div>
  <h1 class="home-title">TalkKids!</h1>
  <p class="home-sub">Class 2 English Conversations</p>
  <div class="home-grid">
    <div class="home-btn" onclick="openLesson(0)">
      <span class="btn-icon">👋</span>Greetings
    </div>
    <div class="home-btn" onclick="openLesson(1)">
      <span class="btn-icon">🏫</span>At School
    </div>
    <div class="home-btn" onclick="openLesson(2)">
      <span class="btn-icon">🍎</span>Food & Lunch
    </div>
    <div class="home-btn" onclick="openLesson(3)">
      <span class="btn-icon">🎨</span>My Hobbies
    </div>
    <div class="home-btn" onclick="openLesson(4)">
      <span class="btn-icon">👨‍👩‍👧</span>My Family
    </div>
    <div class="home-btn" onclick="openLesson(5)">
      <span class="btn-icon">🌦️</span>Weather
    </div>
  </div>
  <div class="stars-bar" id="homeStars"></div>
</div>

<!-- LESSON SCREEN -->
<div id="lesson" class="screen">
  <div class="lesson-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="lesson-title" id="lessonTitle">Lesson</span>
    <span class="lesson-score" id="lessonScore">⭐ 0</span>
  </div>
  <div class="prog-bar-wrap" style="margin:0;border-radius:0;">
    <div class="prog-bar" id="progBar" style="width:0%"></div>
  </div>
  <div class="lesson-body" id="lessonBody"></div>
</div>

<!-- CELEBRATION OVERLAY -->
<div id="celebration">
  <div class="cel-card">
    <div class="cel-emoji" id="celEmoji">🎉</div>
    <div class="cel-title" id="celTitle">Great Job!</div>
    <div class="cel-msg" id="celMsg">You got it right!</div>
    <button class="cel-btn" onclick="closeCel()">Continue →</button>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────
let totalStars = parseInt(localStorage.getItem('talkkids_stars') || '0');
let currentScore = 0;
let currentLesson = 0;

// ── LESSONS DATA ──────────────────────────────────────────────────────────
const lessons = [

  // 0: GREETINGS
  {
    title: "👋 Greetings",
    color: "#7c3aed",
    sections: [
      { type: "vocab", words: [
        { emoji:"😊", word:"Hello", phonetic:"/hɛˈloʊ/", meaning:"A friendly greeting", example:"Hello! My name is Riya." },
        { emoji:"🌅", word:"Good Morning", phonetic:"/ɡʊd ˈmɔːrnɪŋ/", meaning:"Greeting in the morning", example:"Good morning, teacher!" },
        { emoji:"🤝", word:"Nice to meet you", phonetic:"/naɪs tuː miːt juː/", meaning:"Happy to know someone", example:"Nice to meet you, Arjun!" },
      ]},
      { type: "dialogue", title: "Listen & Learn 👂", lines: [
        { who:"teacher", text:"Good morning! How are you today?", trans:"आज आप कैसे हैं?" },
        { who:"student", text:"Good morning! I am fine, thank you.", trans:"मैं ठीक हूँ, धन्यवाद।" },
        { who:"teacher", text:"What is your name?", trans:"आपका नाम क्या है?" },
        { who:"student", text:"My name is Priya. What is your name?", trans:"मेरा नाम प्रिया है।" },
        { who:"teacher", text:"I am Ms. Sunita. Nice to meet you!", trans:"मेरा नाम सुनीता है। मिलकर खुशी हुई!" },
      ]},
      { type: "quiz", title: "Answer the Question ❓",
        q:"What do you say in the morning?",
        options:["Good night","Good morning ✓","Good evening","Goodbye"],
        answer:1, points:10
      },
      { type: "fill", title: "Fill in the Blank ✏️",
        before:"My", blank:"name", after:"is Raju.",
        hint:"Think about introducing yourself!", points:10
      },
      { type: "quiz",
        q:'Complete: "How ___ you?"',
        options:["is","am","are ✓","do"],
        answer:2, points:10
      },
      { type: "match", title: "Match the Pairs 🔗",
        pairs: [
          ["Hello","नमस्ते"], ["Thank you","धन्यवाद"],
          ["Good morning","सुप्रभात"], ["Goodbye","अलविदा"]
        ], points:20
      },
    ]
  },

  // 1: AT SCHOOL
  {
    title: "🏫 At School",
    color: "#2563eb",
    sections: [
      { type: "vocab", words: [
        { emoji:"✏️", word:"Pencil", phonetic:"/ˈpɛnsɪl/", meaning:"Used for writing", example:"Please give me a pencil." },
        { emoji:"📚", word:"Textbook", phonetic:"/ˈtɛkstbʊk/", meaning:"A book we study from", example:"Open your textbook to page 10." },
        { emoji:"🖊️", word:"Homework", phonetic:"/ˈhoʊmwɜːrk/", meaning:"Work done at home", example:"Did you do your homework?" },
      ]},
      { type: "dialogue", title: "In the Classroom 📖", lines: [
        { who:"teacher", text:"Good morning, class! Please sit down.", trans:"कृपया बैठ जाएं।" },
        { who:"student", text:"Good morning, Ma'am!", trans:"सुप्रभात, मैम!" },
        { who:"teacher", text:"Did you do your homework?", trans:"क्या आपने होमवर्क किया?" },
        { who:"student", text:"Yes, Ma'am. I did my homework.", trans:"हाँ, मैमने होमवर्क किया।" },
        { who:"teacher", text:"Very good! Open your textbooks to page 5.", trans:"बहुत अच्छा! पेज 5 खोलें।" },
        { who:"student", text:"Ma'am, may I borrow a pencil?", trans:"क्या मैं पेंसिल ले सकता हूँ?" },
      ]},
      { type: "quiz",
        q:"What do you say to enter the class?",
        options:["May I come in? ✓","Where is the book?","Good night","I am hungry"],
        answer:0, points:10
      },
      { type: "fill", before:"Please", blank:"open", after:"your textbook.",
        hint:"What do you do with a book?", points:10
      },
      { type: "quiz",
        q:'Which sentence asks permission politely?',
        options:["Give me a pen","I want water","May I go out? ✓","You are nice"],
        answer:2, points:10
      },
      { type: "match", title: "School Words Match 🔗",
        pairs:[
          ["Teacher","शिक्षक"],["Student","छात्र"],
          ["Classroom","कक्षा"],["Blackboard","श्यामपट्ट"]
        ], points:20
      },
    ]
  },

  // 2: FOOD
  {
    title: "🍎 Food & Lunch",
    color: "#f97316",
    sections: [
      { type: "vocab", words: [
        { emoji:"🍱", word:"Lunchbox", phonetic:"/ˈlʌntʃbɒks/", meaning:"Box to carry lunch", example:"I have rice in my lunchbox." },
        { emoji:"😋", word:"Delicious", phonetic:"/dɪˈlɪʃəs/", meaning:"Very tasty", example:"The mango is delicious!" },
        { emoji:"🥤", word:"Thirsty", phonetic:"/ˈθɜːrsti/", meaning:"Needing water", example:"I am thirsty. May I drink water?" },
      ]},
      { type: "dialogue", title: "Lunch Time! 🍽️", lines: [
        { who:"student", text:"I am hungry. What time is lunch?", trans:"मुझे भूख है। दोपहर का खाना कब है?" },
        { who:"teacher", text:"Lunch is at 12 o'clock.", trans:"दोपहर का खाना 12 बजे है।" },
        { who:"student", text:"What did you bring for lunch?", trans:"आप दोपहर के लिए क्या लाए?" },
        { who:"student", text:"I have rice and dal. It is delicious!", trans:"मेरे पास चावल और दाल है। यह स्वादिष्ट है!" },
        { who:"teacher", text:"Do you like vegetables?", trans:"क्या आपको सब्जियाँ पसंद हैं?" },
        { who:"student", text:"Yes! I like carrots and beans.", trans:"हाँ! मुझे गाजर और बीन्स पसंद हैं।" },
      ]},
      { type: "quiz",
        q:"What do you say when you are hungry?",
        options:["I am sleepy","I am hungry ✓","I am angry","I am happy"],
        answer:1, points:10
      },
      { type: "fill", before:"The mango is very", blank:"tasty", after:"and sweet.",
        hint:"Another word for delicious!", points:10
      },
      { type: "quiz",
        q:'"I ___ carrots and peas." Which word fits?',
        options:["hate","dislike","like ✓","forget"],
        answer:2, points:10
      },
    ]
  },

  // 3: HOBBIES
  {
    title: "🎨 My Hobbies",
    color: "#ec4899",
    sections: [
      { type: "vocab", words: [
        { emoji:"🎨", word:"Drawing", phonetic:"/ˈdrɔːɪŋ/", meaning:"Making pictures", example:"I love drawing animals." },
        { emoji:"⚽", word:"Football", phonetic:"/ˈfʊtbɔːl/", meaning:"A sport with a ball", example:"We play football after school." },
        { emoji:"📖", word:"Reading", phonetic:"/ˈriːdɪŋ/", meaning:"Looking at books", example:"Reading is my favourite hobby." },
      ]},
      { type: "dialogue", title: "What Do You Like? 🌟", lines: [
        { who:"teacher", text:"What is your favourite hobby?", trans:"आपका पसंदीदा शौक क्या है?" },
        { who:"student", text:"I love drawing! I draw every day.", trans:"मुझे चित्र बनाना बहुत पसंद है!" },
        { who:"teacher", text:"Do you play any sport?", trans:"क्या आप कोई खेल खेलते हैं?" },
        { who:"student", text:"Yes! I play football with my friends.", trans:"हाँ! मैं दोस्तों के साथ फुटबॉल खेलता हूँ।" },
        { who:"teacher", text:"What do you do in the evening?", trans:"शाम को आप क्या करते हैं?" },
        { who:"student", text:"I read storybooks. I like adventure stories!", trans:"मैं कहानी की किताबें पढ़ता हूँ!" },
      ]},
      { type: "quiz",
        q:'"___ is your favourite hobby?" Fill in.',
        options:["Who","Where","What ✓","When"],
        answer:2, points:10
      },
      { type: "fill", before:"I love", blank:"drawing", after:"colourful pictures.",
        hint:"Making pictures is called...?", points:10
      },
      { type: "quiz",
        q:'Choose the correct sentence:',
        options:["I plays cricket","I am play cricket","I play cricket ✓","I playing cricket"],
        answer:2, points:10
      },
    ]
  },

  // 4: FAMILY
  {
    title: "👨‍👩‍👧 My Family",
    color: "#10b981",
    sections: [
      { type: "vocab", words: [
        { emoji:"👩", word:"Mother", phonetic:"/ˈmʌðər/", meaning:"Your mama", example:"My mother cooks delicious food." },
        { emoji:"👨", word:"Father", phonetic:"/ˈfɑːðər/", meaning:"Your papa", example:"My father goes to work every day." },
        { emoji:"👧", word:"Sister", phonetic:"/ˈsɪstər/", meaning:"A girl in your family", example:"My sister is younger than me." },
      ]},
      { type: "dialogue", title: "Tell About Family 🏠", lines: [
        { who:"teacher", text:"How many people are in your family?", trans:"आपके परिवार में कितने लोग हैं?" },
        { who:"student", text:"There are four people in my family.", trans:"मेरे परिवार में चार लोग हैं।" },

// ── VOCAB CARD CAROUSEL ────────────────────────────────────────────────────
let vocabIndex = {};

function renderVocabSection(words, sectionId) {
  if (!vocabIndex[sectionId]) vocabIndex[sectionId] = 0;
  const idx = vocabIndex[sectionId];
  const w = words[idx];
  return `
    <div class="vocab-card">
      <div class="vocab-emoji">${w.emoji}</div>
      <div class="vocab-word">${w.word}</div>
      <div class="vocab-phonetic">${w.phonetic}</div>
      <div class="vocab-meaning">${w.meaning}</div>
      <div class="vocab-example">"${w.example}"</div>
      <div style="margin-top:0.75rem;display:flex;gap:0.5rem;justify-content:center;align-items:center;">
        ${idx > 0 ? `<button class="speak-btn" style="background:#6366f1" onclick="vocabNav('${sectionId}',${idx-1},${JSON.stringify(words).replace(/'/g,"\\'")},'${sectionId}')">◀</button>` : ''}
        <button class="speak-btn" onclick="speak('${w.word}')">🔊 Hear it</button>
        ${idx < words.length-1 ? `<button class="speak-btn" style="background:#6366f1" onclick="vocabNav('${sectionId}',${idx+1},${JSON.stringify(words).replace(/'/g,"\\'")},'${sectionId}')">▶</button>` : ''}
      </div>
      <div style="margin-top:0.4rem;color:#9ca3af;font-size:0.72rem;">${idx+1} / ${words.length} words</div>
    </div>`;
}

function vocabNav(secId, newIdx, words, cardId) {
  vocabIndex[secId] = newIdx;
  const w = words[newIdx];
  const card = document.getElementById('vc_' + cardId);
  if (card) {
    card.innerHTML = renderVocabSection(words, secId).replace(/<div class="vocab-card">/, '').replace(/<\/div>$/, '');
    // Re-render properly
  }
  renderLesson(currentLesson); // simpler: just re-render
}

// ── DIALOGUE ───────────────────────────────────────────────────────────────
function renderDialogue(lines) {
  return lines.map((l,i) => `
    <div class="bubble-row ${l.who}" style="animation-delay:${i*0.1}s">
      <div class="avatar ${l.who}-av">${l.who === 'teacher' ? '👩‍🏫' : '🧒'}</div>
      <div class="bubble ${l.who}-b" onclick="toggleTrans(this); speak('${l.text.replace(/'/g,"\\'")}')">
        ${l.text} <span class="speak-icon">🔊</span>
        <div class="translation">${l.trans}</div>
      </div>
    </div>`).join('');
}

function toggleTrans(el) { el.classList.toggle('show-trans'); }

// ── QUIZ ───────────────────────────────────────────────────────────────────
let quizAnswered = {};

function renderQuiz(section, uid) {
  const opts = section.options.map((o,i) => `
    <button class="quiz-opt" id="opt_${uid}_${i}" onclick="answerQuiz(${uid},${i},${section.answer},${section.points||10})">
      <span>${String.fromCharCode(65+i)}.</span> ${o.replace(' ✓','')}
    </button>`).join('');
  return `
    <div class="quiz-card">
      <div class="quiz-q"><span class="q-label">Q</span>${section.q}</div>
      <div class="quiz-options">${opts}</div>
      <div class="quiz-feedback" id="qfb_${uid}"></div>
    </div>`;
}

function answerQuiz(uid, chosen, correct, points) {
  if (quizAnswered[uid]) return;
  quizAnswered[uid] = true;
  const fb = document.getElementById(`qfb_${uid}`);
  const opts = document.querySelectorAll(`[id^="opt_${uid}_"]`);
  opts.forEach((o,i) => {
    o.classList.add('disabled');
    if (i === correct) o.classList.add('correct');
    else if (i === chosen) o.classList.add('wrong');
  });
  if (chosen === correct) {
    addScore(points);
    fb.className = 'quiz-feedback show good';
    fb.textContent = '🎉 Correct! Well done!';
    celebrate('🌟', 'Correct!', `+${points} stars earned!`);
  } else {
    fb.className = 'quiz-feedback show bad';
    fb.textContent = `❌ Try again! The answer is: ${document.querySelector(`#opt_${uid}_${correct}`).textContent.trim()}`;
  }
}

// ── FILL BLANK ────────────────────────────────────────────────────────────
let fillAnswered = {};

function renderFill(section, uid) {
  return `
    <div class="quiz-card">
      <div class="quiz-q"><span class="q-label" style="background:#f97316">✏️</span>${section.title || 'Fill in the blank'}</div>
      <div class="fill-wrap">
        ${section.before} <input class="fill-blank" id="fill_${uid}" placeholder="____" autocomplete="off"> ${section.after}
      </div>
      <div style="color:#9ca3af;font-size:0.75rem;margin-top:0.4rem;">💡 ${section.hint}</div>
      <button class="check-btn" onclick="checkFill('${uid}','${section.blank}',${section.points||10})">Check ✓</button>
      <div class="quiz-feedback" id="ffb_${uid}"></div>
    </div>`;
}

function checkFill(uid, answer, points) {
  if (fillAnswered[uid]) return;
  const val = document.getElementById(`fill_${uid}`).value.trim().toLowerCase();
  const fb = document.getElementById(`ffb_${uid}`);
  if (val === answer.toLowerCase()) {
    fillAnswered[uid] = true;
    addScore(points);
    fb.className = 'quiz-feedback show good';
    fb.textContent = '🎉 Perfect spelling!';
    celebrate('✨', 'Perfect!', `+${points} stars!`);
  } else {
    fb.className = 'quiz-feedback show bad';
    fb.textContent = `Not quite! Hint: starts with "${answer[0].toUpperCase()}"`;
  }
}

// ── WORD MATCH ────────────────────────────────────────────────────────────
let matchState = {};

function renderMatch(section, uid) {
  const left = section.pairs.map(p => p[0]);
  const right = [...section.pairs.map(p => p[1])].sort(() => Math.random()-0.5);
  matchState[uid] = { pairs: section.pairs, selected: null, matched: [], points: section.points||20 };
  const leftH = left.map((w,i) => `<div class="match-word" id="ml_${uid}_${i}" onclick="selectMatch('L','${uid}',${i},'${w}')">${w}</div>`).join('');
  const rightH = right.map((w,i) => `<div class="match-word" id="mr_${uid}_${i}" onclick="selectMatch('R','${uid}',${i},'${w}')">${w}</div>`).join('');
  return `
    <div class="quiz-card">
      <div class="quiz-q"><span class="q-label" style="background:#10b981">🔗</span>${section.title||'Match the pairs'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.5rem">
        <div style="display:flex;flex-direction:column;gap:0.5rem">${leftH}</div>
        <div style="display:flex;flex-direction:column;gap:0.5rem">${rightH}</div>
      </div>
      <div class="quiz-feedback" id="mfb_${uid}"></div>
    </div>`;
}

function selectMatch(side, uid, idx, word) {
  const st = matchState[uid];
  const el = document.getElementById(`m${side==='L'?'l':'r'}_${uid}_${idx}`);
  if (el.classList.contains('matched')) return;
  if (!st.selected) {
    el.classList.add('selected');
    st.selected = { side, idx, word, el };
  } else {
    const prev = st.selected;
    if (prev.side === side) {
      prev.el.classList.remove('selected');
      el.classList.add('selected');
      st.selected = { side, idx, word, el };
      return;
    }
    // Check if pair
    const lWord = side === 'R' ? prev.word : word;
    const rWord = side === 'R' ? word : prev.word;
    const isMatch = st.pairs.some(p => p[0]===lWord && p[1]===rWord);
    prev.el.classList.remove('selected');
    if (isMatch) {
      prev.el.classList.add('matched'); el.classList.add('matched');
      st.matched.push(lWord);
      if (st.matched.length === st.pairs.length) {
        addScore(st.points);
        document.getElementById(`mfb_${uid}`).className = 'quiz-feedback show good';
        document.getElementById(`mfb_${uid}`).textContent = `🎉 All matched! +${st.points} stars!`;
        celebrate('🏆','All Matched!',`+${st.points} stars earned!`);
      }
    } else {
      prev.el.classList.add('wrong-sel'); el.classList.add('wrong-sel');
      setTimeout(()=>{ prev.el.classList.remove('wrong-sel'); el.classList.remove('wrong-sel'); },700);
    }
    st.selected = null;
  }
}

// ── RENDER LESSON ─────────────────────────────────────────────────────────
function renderLesson(idx) {
  const lesson = lessons[idx];
  currentLesson = idx;
  quizAnswered = {}; fillAnswered = {}; matchState = {}; vocabIndex = {};
  currentScore = 0;
  document.getElementById('lessonTitle').textContent = lesson.title;
  document.getElementById('lessonScore').textContent = '⭐ 0';
  document.getElementById('progBar').style.width = '0%';
  let html = '';
  lesson.sections.forEach((sec, si) => {
    const uid = `s${si}`;
    switch(sec.type) {
      case 'vocab':
        html += `<div class="section-head">📚 Vocabulary</div>`;
        vocabIndex[uid] = 0;
        html += `<div id="vc_${uid}">`;
        const w = sec.words[0];
        html += `<div class="vocab-card">
          <div class="vocab-emoji">${w.emoji}</div>
          <div class="vocab-word">${w.word}</div>
          <div class="vocab-phonetic">${w.phonetic}</div>
          <div class="vocab-meaning">${w.meaning}</div>
          <div class="vocab-example">"${w.example}"</div>
          <div style="margin-top:0.75rem;display:flex;gap:0.5rem;justify-content:center;">
            <span style="color:#9ca3af;font-size:0.8rem;align-self:center;">1/${sec.words.length}</span>
            <button class="speak-btn" onclick="speak('${w.word}')">🔊 Hear it</button>
            <button class="speak-btn" style="background:#6366f1" onclick="nextVocab('${uid}',1,${si})">Next ▶</button>
          </div>
        </div>`;
        html += `</div>`;
        // Store words for later
        html += `<script>window['vwords_${uid}']=${JSON.stringify(sec.words)}<\/script>`;
        break;
      case 'dialogue':
        html += `<div class="section-head">${sec.title||'💬 Dialogue'}</div>`;
        html += `<div class="translate-hint">👆 Tap any bubble to hear & translate</div>`;
        html += `<div class="dialogue-wrap">${renderDialogue(sec.lines)}</div>`;
        break;
      case 'quiz':
        html += `<div class="section-head">${sec.title||'❓ Quiz'}</div>`;
        html += renderQuiz(sec, uid);
        break;
      case 'fill':
        html += `<div class="section-head">${sec.title||'✏️ Fill the Blank'}</div>`;
        html += renderFill(sec, uid);
        break;
      case 'match':
        html += `<div class="section-head">${sec.title||'🔗 Match'}</div>`;
        html += renderMatch(sec, uid);
        break;
    }
  });
  html += `<div style="height:1rem"></div>`;
  document.getElementById('lessonBody').innerHTML = html;
}

function nextVocab(uid, newIdx, si) {
  const words = window['vwords_' + uid];
  if (!words || newIdx >= words.length) return;
  vocabIndex[uid] = newIdx;
  const w = words[newIdx];
  document.getElementById('vc_' + uid).innerHTML = `
    <div class="vocab-card">
      <div class="vocab-emoji">${w.emoji}</div>
      <div class="vocab-word">${w.word}</div>
      <div class="vocab-phonetic">${w.phonetic}</div>
      <div class="vocab-meaning">${w.meaning}</div>
      <div class="vocab-example">"${w.example}"</div>
      <div style="margin-top:0.75rem;display:flex;gap:0.5rem;justify-content:center;align-items:center;">
        ${newIdx > 0 ? `<button class="speak-btn" style="background:#6366f1" onclick="nextVocab('${uid}',${newIdx-1},${si})">◀ Prev</button>` : ''}
        <button class="speak-btn" onclick="speak('${w.word}')">🔊 Hear it</button>
        ${newIdx < words.length-1 ? `<button class="speak-btn" style="background:#6366f1" onclick="nextVocab('${uid}',${newIdx+1},${si})">Next ▶</button>` : ''}
      </div>
      <div style="margin-top:0.4rem;color:#9ca3af;font-size:0.72rem;">${newIdx+1} / ${words.length} words</div>
    </div>`;
}

// ── SCORE & PROGRESS ───────────────────────────────────────────────────────
function addScore(pts) {
  currentScore += pts;
  totalStars += pts;
  localStorage.setItem('talkkids_stars', totalStars);
  document.getElementById('lessonScore').textContent = `⭐ ${currentScore}`;
  // Update progress bar (rough estimate based on score vs max ~60)
  const pct = Math.min(100, (currentScore / 60) * 100);
  document.getElementById('progBar').style.width = pct + '%';
  updateHomeStars();
}

// ── CELEBRATE ─────────────────────────────────────────────────────────────
function celebrate(emoji, title, msg) {
  document.getElementById('celEmoji').textContent = emoji;
  document.getElementById('celTitle').textContent = title;
  document.getElementById('celMsg').textContent = msg;
  document.getElementById('celebration').classList.add('show');
  setTimeout(closeCel, 2200);
}
function closeCel() { document.getElementById('celebration').classList.remove('show'); }

// ── SPEECH ────────────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-IN';
  u.rate = 0.85;
  u.pitch = 1.1;
  speechSynthesis.speak(u);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function openLesson(idx) {
  document.getElementById('home').classList.remove('active');
  document.getElementById('lesson').classList.add('active');
  renderLesson(idx);
  document.getElementById('lessonBody').scrollTop = 0;
}

function goHome() {
  document.getElementById('lesson').classList.remove('active');
  document.getElementById('home').classList.add('active');
  updateHomeStars();
}

function updateHomeStars() {
  const stars = parseInt(localStorage.getItem('talkkids_stars') || '0');
  const bar = document.getElementById('homeStars');
  const count = Math.min(10, Math.floor(stars / 10));
  bar.innerHTML = Array.from({length:10}, (_,i) =>
    `<span class="star ${i<count?'lit':''}">⭐</span>`
  ).join('');
}

updateHomeStars();
